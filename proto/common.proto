syntax = "proto3";

package adviskv.pb;

message BaseRsp {
    int32 code = 1;
    string msg = 2;
}

enum RaftRole {
  RAFT_ROLE_UNSPECIFIED = 0;
  RAFT_ROLE_FOLLOWER = 1;
  RAFT_ROLE_LEADER = 2;
  RAFT_ROLE_CANDIDATE = 3;
}

enum ReplicaStatus {
  ADDING = 0;
  READY = 1;
  LOST = 2;
  ERROR = 3;
}

enum NodeStatus {
  NODE_ONLINE = 0;
  NODE_OFFLINE = 1;
  NODE_SUSPECT = 2;
}

enum StorageReplicaStatus {
  STORAGE_REPLICA_STATUS_UNSPECIFIED = 0;
  STORAGE_REPLICA_STATUS_INITIALIZING = 1;
  STORAGE_REPLICA_STATUS_RECOVERING = 2;
  STORAGE_REPLICA_STATUS_READY = 3;
  STORAGE_REPLICA_STATUS_FAULTED = 4;
}

message NodeInfo {
  string node_name = 1;
  string host = 2;
  int32 port = 3;
  NodeStatus status = 4;
}

message ReplicaInfo {
  int32 table_id = 1;
  int32 shard_id = 2;
  int32 replica_id = 3;
  string node_id = 4;
  RaftRole role = 5;
  StorageReplicaStatus status = 6;
  Endpoint endpoint = 7;
  int64 term = 8;
}

message ReplicaID {
  int32 table_id = 1;
  int32 shard_index = 2;
  int32 replica_index = 3;
}

message Endpoint {
  string ip = 1;
  int32 port = 2;
}

message PeerMember {
  adviskv.pb.ReplicaID replica_id = 1;
  string node_id = 2;
  adviskv.pb.Endpoint endpoint = 3;
}

syntax = "proto3";

package adviskv.pb;

message BaseRsp {
    int32 code = 1;
    string msg = 2;
}

enum ReplicaRole {
  LEADER = 0;
  FOLLOWER = 1;
  PRE_LEADER = 2;
  PRE_FOLLOWER = 3;
}

enum ReplicaStatus {
  ADDING = 0;
  READY = 1;
  LOST = 2;
  ERROR = 3;
}

enum NodeStatus {
  NODE_ONLINE = 0;
  NODE_OFFLINE = 1;
  NODE_SUSPECT = 2;
}

message NodeInfo {
  string node_name = 1;
  string host = 2;
  int32 port = 3;
  NodeStatus status = 4;
}

message ReplicaInfo {
  int32 table_id = 1;
  int32 shard_id = 2;
  int32 replica_id = 3;
  string node_id = 4;
  ReplicaRole role = 5;
}

message ReplicaID {
  int32 table_id = 1;
  int32 shard_index = 2;
  int32 replica_index = 3;
}

message Endpoint {
  string ip = 1;
  int32 port = 2;
}


syntax = "proto3";

package adviskv.pb;

message BaseRsp {
    int32 code = 1;
    string msg = 2;
}

enum RaftRole {
  RAFT_ROLE_FOLLOWER = 0;
  RAFT_ROLE_LEADER = 1;
  RAFT_ROLE_CANDIDATE = 2;
}

enum RaftMemberType {
  RAFT_MEMBER_TYPE_NON_MEMBER = 0;
  RAFT_MEMBER_TYPE_VOTER = 1;
  RAFT_MEMBER_TYPE_LEARNER = 2;
}

enum EngineType {
  ENGINE_TYPE_MAP = 0;
  ENGINE_TYPE_ROCKSDB = 1;
}



enum MetaTableState {
  META_TABLE_STATE_ADDING = 0;
  META_TABLE_STATE_NORMAL = 1;
  META_TABLE_STATE_FAILED = 2;
  META_TABLE_STATE_DROPPING = 3;
  META_TABLE_STATE_DELETED = 4;
  META_TABLE_STATE_ALTERING = 5;
}

enum SdmTableDesired {
  SDM_TABLE_DESIRED_PRESENT = 0;
  SDM_TABLE_DESIRED_ABSENT = 1;
}

enum SdmTablePhase {
  SDM_TABLE_PHASE_CREATING = 0;
  SDM_TABLE_PHASE_READY = 1;
  SDM_TABLE_PHASE_DELETING = 2;
  SDM_TABLE_PHASE_DELETED = 3;
  SDM_TABLE_PHASE_FAILED = 4;
  SDM_TABLE_PHASE_RESIZING = 5;
}

enum NodeStatus {
  NODE_ONLINE = 0;
  NODE_OFFLINE = 1;
  NODE_SUSPECT = 2;
}

enum StorageReplicaStatus {
  STORAGE_REPLICA_STATUS_INITIALIZING = 0;
  STORAGE_REPLICA_STATUS_RECOVERING = 1;
  STORAGE_REPLICA_STATUS_READY = 2;
  STORAGE_REPLICA_STATUS_FAULTED = 3;
}

message NodeInfo {
  string node_name = 1;
  string host = 2;
  int32 port = 3;
  NodeStatus status = 4;
}

message ReplicaInfo {
  int32 table_id = 1;
  int32 shard_id = 2;
  int32 replica_seq = 3;
  string node_id = 4;
  RaftRole role = 5;
  StorageReplicaStatus status = 6;
  Endpoint endpoint = 7;
  int64 term = 8;
}

message ReplicaID {
  int32 table_id = 1;
  int32 shard_index = 2;
  int32 replica_seq = 3;
}

message Endpoint {
  string ip = 1;
  int32 port = 2;
}

message PeerMember {
  adviskv.pb.ReplicaID replica_id = 1;
  string node_id = 2;
  adviskv.pb.Endpoint endpoint = 3;
}

message RaftMember {
  adviskv.pb.PeerMember peer = 1;
  adviskv.pb.RaftMemberType member_type = 2;
}

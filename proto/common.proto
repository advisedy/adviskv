syntax = "proto3";

package adviskv.pb;

message BaseRsp {
    int32 code = 1;
    string msg = 2;
}

enum RaftRole {
  RAFT_ROLE_UNSPECIFIED = 0;
  RAFT_ROLE_FOLLOWER = 1;
  RAFT_ROLE_LEADER = 2;
  RAFT_ROLE_CANDIDATE = 3;
}

enum RaftMemberType {
  RAFT_MEMBER_TYPE_NON_MEMBER = 0;
  RAFT_MEMBER_TYPE_VOTER = 1;
  RAFT_MEMBER_TYPE_LEARNER = 2;
}



enum MetaTableState {
  META_TABLE_STATE_UNSPECIFIED = 0;
  META_TABLE_STATE_ADDING = 1;
  META_TABLE_STATE_NORMAL = 2;
  META_TABLE_STATE_FAILED = 3;
  META_TABLE_STATE_DROPPING = 4;
  META_TABLE_STATE_DELETED = 5;
  META_TABLE_STATE_ALTERING = 6;
}

enum SdmTableDesired {
  SDM_TABLE_DESIRED_UNSPECIFIED = 0;
  SDM_TABLE_DESIRED_PRESENT = 1;
  SDM_TABLE_DESIRED_ABSENT = 2;
}

enum SdmTablePhase {
  SDM_TABLE_PHASE_UNSPECIFIED = 0;
  SDM_TABLE_PHASE_CREATING = 1;
  SDM_TABLE_PHASE_READY = 2;
  SDM_TABLE_PHASE_DELETING = 3;
  SDM_TABLE_PHASE_DELETED = 4;
  SDM_TABLE_PHASE_FAILED = 5;
  SDM_TABLE_PHASE_RESIZING = 6;
}

enum NodeStatus {
  NODE_ONLINE = 0;
  NODE_OFFLINE = 1;
  NODE_SUSPECT = 2;
}

enum StorageReplicaStatus {
  STORAGE_REPLICA_STATUS_UNSPECIFIED = 0;
  STORAGE_REPLICA_STATUS_INITIALIZING = 1;
  STORAGE_REPLICA_STATUS_RECOVERING = 2;
  STORAGE_REPLICA_STATUS_READY = 3;
  STORAGE_REPLICA_STATUS_FAULTED = 4;
}

message NodeInfo {
  string node_name = 1;
  string host = 2;
  int32 port = 3;
  NodeStatus status = 4;
}

message ReplicaInfo {
  int32 table_id = 1;
  int32 shard_id = 2;
  int32 replica_seq = 3;
  string node_id = 4;
  RaftRole role = 5;
  StorageReplicaStatus status = 6;
  Endpoint endpoint = 7;
  int64 term = 8;
}

message ReplicaID {
  int32 table_id = 1;
  int32 shard_index = 2;
  int32 replica_seq = 3;
}

message Endpoint {
  string ip = 1;
  int32 port = 2;
}

message PeerMember {
  adviskv.pb.ReplicaID replica_id = 1;
  string node_id = 2;
  adviskv.pb.Endpoint endpoint = 3;
}

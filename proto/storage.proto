syntax = "proto3";

package adviskv.rpc;

import "common.proto";


message PutRequest {
  int32 table_id = 1;
  int32 shard_id = 2;
  bytes key = 3;
  bytes value = 4;
  int64 expire_ts = 5;
}

message PutResponse {
  adviskv.pb.BaseRsp base_rsp = 1;
}

message GetRequest {
  int32 table_id = 1;
  int32 shard_id = 2;
  bytes key = 3;
}

message GetResponse {
  adviskv.pb.BaseRsp base_rsp = 1;
  bytes value = 2;
}

message DeleteRequest {
  int32 table_id = 1;
  int32 shard_id = 2;
  bytes key = 3;
}

message DeleteResponse {
  adviskv.pb.BaseRsp base_rsp = 1;
}



message CreateReplicaRequest {
  int32 table_id = 1;
  int32 shard_index = 2;
  int32 replica_index = 3;
  int32 engine_type = 4;
  repeated adviskv.pb.PeerMember members = 5;
}

message CreateReplicaResponse {
  adviskv.pb.BaseRsp base_rsp = 1;
}

message DeleteReplicaRequest {
  int32 table_id = 1;
  int32 shard_id = 2;
  int32 replica_id = 3;
}

message DeleteReplicaResponse {
  adviskv.pb.BaseRsp base_rsp = 1;
}

message GetReplicaInfoRequest {
  int32 table_id = 1;
  int32 shard_id = 2;
  int32 replica_id = 3;
}

message GetReplicaInfoResponse {
  adviskv.pb.BaseRsp base_rsp = 1;
  bool exists = 2;
  adviskv.pb.ReplicaInfo replica = 3;
}

message RequestVoteRequest{
  adviskv.pb.ReplicaID from = 1;
  adviskv.pb.ReplicaID to = 2;
  int64 term = 3;
  int64 last_log_index = 4;
  int64 last_log_term = 5;
}

message RequestVoteResponse{
  adviskv.pb.BaseRsp base_rsp = 1;
  int64 term = 2;
  bool vote_granted = 3;
}

message LogEntry{
  int64 term = 1;
  int64 index = 2;
  int32 op_type = 3;
  string key = 4;
  string value = 5;
}

message AppendEntriesRequest{
  adviskv.pb.ReplicaID from = 1;
  adviskv.pb.ReplicaID to = 2;
  int64 term = 3;
  int64 prev_log_index = 4;
  int64 prev_log_term = 5;
  repeated LogEntry entries = 6;
  int64 leader_commit = 7;
}

message AppendEntriesResponse{
  adviskv.pb.BaseRsp base_rsp = 1;
  int64 term = 2;
  bool success = 3;
}

message InstallSnapshotRequest {
  adviskv.pb.ReplicaID from = 1;
  adviskv.pb.ReplicaID to = 2;
  int64 term = 3;
  int64 apply_index = 4;
  int64 apply_term = 5;
  uint64 offset = 6;
  bytes data = 7;
  bool done = 8;
}

message InstallSnapshotResponse {
  adviskv.pb.BaseRsp base_rsp = 1;
  int64 term = 2;
}

message TestGetReplicaApplyStateRequest {
  int32 table_id = 1;
  int32 shard_id = 2;
}

message TestGetReplicaApplyStateResponse {
  adviskv.pb.BaseRsp base_rsp = 1;
  bool exists = 2;
  adviskv.pb.ReplicaRole role = 3;
  adviskv.pb.ReplicaStatus status = 4;
  int64 current_term = 5;
  int64 commit_index = 6;
  int64 last_applied = 7;
}

service StorageService {
  rpc Put(PutRequest) returns (PutResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);

  rpc CreateReplica(CreateReplicaRequest) returns (CreateReplicaResponse);
  rpc DeleteReplica(DeleteReplicaRequest) returns (DeleteReplicaResponse);
  rpc GetReplicaInfo(GetReplicaInfoRequest) returns (GetReplicaInfoResponse);

  rpc RequestVote(RequestVoteRequest) returns(RequestVoteResponse);
  rpc AppendEntries(AppendEntriesRequest) returns(AppendEntriesResponse);
  rpc InstallSnapshot(InstallSnapshotRequest) returns(InstallSnapshotResponse);

  rpc TestGetReplicaApplyState(TestGetReplicaApplyStateRequest) returns (TestGetReplicaApplyStateResponse);
}

syntax = "proto3";

package adviskv.rpc;

import "common.proto";


message PutRequest {
  int32 table_id = 1;
  int32 shard_id = 2;
  bytes key = 3;
  bytes value = 4;
  int64 expire_ts = 5;
}

message PutResponse {
  adviskv.pb.BaseRsp base_rsp = 1;
}

message GetRequest {
  int32 table_id = 1;
  int32 shard_id = 2;
  bytes key = 3;
}

message GetResponse {
  adviskv.pb.BaseRsp base_rsp = 1;
  bytes value = 2;
}

message DeleteRequest {
  int32 table_id = 1;
  int32 shard_id = 2;
  bytes key = 3;
}

message DeleteResponse {
  adviskv.pb.BaseRsp base_rsp = 1;
}

message CreateReplicaRequest {
  int32 table_id = 1;
  int32 shard_id = 2;
  int32 replica_id = 3;
  adviskv.pb.ReplicaRole role = 4;
  adviskv.pb.EngineType engine_type = 5;
}

message CreateReplicaResponse {
  adviskv.pb.BaseRsp base_rsp = 1;
}

message DeleteReplicaRequest {
  int32 table_id = 1;
  int32 shard_id = 2;
  int32 replica_id = 3;
}

message DeleteReplicaResponse {
  adviskv.pb.BaseRsp base_rsp = 1;
}

message GetReplicaInfoRequest {
  int32 table_id = 1;
  int32 shard_id = 2;
}

message GetReplicaInfoResponse {
  adviskv.pb.BaseRsp base_rsp = 1;
  repeated adviskv.pb.ReplicaInfo replicas = 2;
}

service StorageService {
  rpc Put(PutRequest) returns (PutResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);

  rpc CreateReplica(CreateReplicaRequest) returns (CreateReplicaResponse);
  rpc DeleteReplica(DeleteReplicaRequest) returns (DeleteReplicaResponse);
  rpc GetReplicaInfo(GetReplicaInfoRequest) returns (GetReplicaInfoResponse);
}

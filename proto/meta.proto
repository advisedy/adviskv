syntax = "proto3";

package adviskv.rpc;

import "common.proto";

message CreateDBRequest {
  string db_name = 1;
}

message CreateDBResponse {
  adviskv.pb.BaseRsp base_rsp = 1;
  int32 db_id = 2;
}

message CreateTableRequest {
  string db_name = 1;
  string table_name = 2;
  int32 shard_count = 3;
  int32 replica_count = 4;
}

message CreateTableResponse {
  adviskv.pb.BaseRsp base_rsp = 1;
  int32 table_id = 2;
}

message GetTableRequest {
  string db_name = 1;
  string table_name = 2;
}

message GetTableResponse {
  adviskv.pb.BaseRsp base_rsp = 1;
  int32 db_id = 2;
  int32 table_id = 3;
  int32 shard_count = 4;
  int32 replica_count = 5;
}


service MetaService {
  rpc CreateDB(CreateDBRequest) returns (CreateDBResponse);
  rpc CreateTable(CreateTableRequest) returns (CreateTableResponse);
  rpc GetTable(GetTableRequest) returns (GetTableResponse);
}

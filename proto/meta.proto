syntax = "proto3";

package adviskv.rpc;

import "common.proto";

message CreateDBRequest {
  string db_name = 1;
  string zone = 2;
}

message CreateDBResponse {
  adviskv.pb.BaseRsp base_rsp = 1;
  int32 db_id = 2;
}

message CreateTableRequest {
  string db_name = 1;
  string table_name = 2;
  int32 shard_count = 3;
  int32 replica_count = 4;
  string resource_pool = 5;
}

message CreateTableResponse {
  adviskv.pb.BaseRsp base_rsp = 1;
  int32 table_id = 2;
  adviskv.pb.MetaTableState table_state = 3;
  string operation_id = 4;
}

message MetaDropTableRequest {
  string db_name = 1;
  string table_name = 2;
}

message MetaDropTableResponse {
  adviskv.pb.BaseRsp base_rsp = 1;
  int32 table_id = 2;
  adviskv.pb.MetaTableState table_state = 3;
  string operation_id = 4;
}

message GetTableRequest {
  string db_name = 1;
  string table_name = 2;
  bool use_table_id = 3;
  int32 table_id = 4;
}

message GetTableResponse {
  adviskv.pb.BaseRsp base_rsp = 1;
  int32 db_id = 2;
  int32 table_id = 3;
  int32 shard_count = 4;
  int32 replica_count = 5;
  adviskv.pb.MetaTableState table_state = 6;
  string last_error_msg = 7;
  string operation_id = 8;
}


service MetaService {
  rpc CreateDB(CreateDBRequest) returns (CreateDBResponse);
  rpc CreateTable(CreateTableRequest) returns (CreateTableResponse);
  rpc DropTable(MetaDropTableRequest) returns (MetaDropTableResponse);
  rpc GetTable(GetTableRequest) returns (GetTableResponse);
}

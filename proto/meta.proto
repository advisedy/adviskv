syntax = "proto3";

package adviskv.meta.rpc;

import "common.proto";

message CreateDBRequest {
  string db_name = 1;
  string zone = 2;
}

message CreateDBResponse {
  adviskv.pb.BaseRsp base_rsp = 1;
  int32 db_id = 2;
}

message DropDBRequest {
  string db_name = 1;
}

message DropDBResponse {
  adviskv.pb.BaseRsp base_rsp = 1;
  int32 db_id = 2;
}

message CreateTableRequest {
  string db_name = 1;
  string table_name = 2;
  int32 shard_count = 3;
  int32 replica_count = 4;
  string resource_pool = 5;
  adviskv.pb.EngineType engine_type = 6;
}

message CreateTableResponse {
  adviskv.pb.BaseRsp base_rsp = 1;
  int32 table_id = 2;
  adviskv.pb.MetaTableState table_state = 3;
  string operation_id = 4;
}

message DropTableRequest {
  string db_name = 1;
  string table_name = 2;
}

message DropTableResponse {
  adviskv.pb.BaseRsp base_rsp = 1;
  int32 table_id = 2;
  adviskv.pb.MetaTableState table_state = 3;
  string operation_id = 4;
}

message AlterTableReplicaCountRequest {
  string db_name = 1;
  string table_name = 2;
  int32 replica_count = 3;
}

message AlterTableReplicaCountResponse {
  adviskv.pb.BaseRsp base_rsp = 1;
  int32 table_id = 2;
  adviskv.pb.MetaTableState table_state = 3;
  string operation_id = 4;
}

message GetTableRequest {
  string db_name = 1;
  string table_name = 2;
  bool use_table_id = 3;
  int32 table_id = 4;
}

message GetTableResponse {
  adviskv.pb.BaseRsp base_rsp = 1;
  int32 db_id = 2;
  int32 table_id = 3;
  int32 shard_count = 4;
  int32 replica_count = 5;
  adviskv.pb.MetaTableState table_state = 6;
  string last_error_msg = 7;
  string operation_id = 8;
  adviskv.pb.EngineType engine_type = 9;
}


service MetaService {
  rpc CreateDB(CreateDBRequest) returns (CreateDBResponse);
  rpc DropDB(DropDBRequest) returns (DropDBResponse);
  rpc CreateTable(CreateTableRequest) returns (CreateTableResponse);
  rpc DropTable(DropTableRequest) returns (DropTableResponse);
  rpc AlterTableReplicaCount(AlterTableReplicaCountRequest) returns (AlterTableReplicaCountResponse);
  rpc GetTable(GetTableRequest) returns (GetTableResponse);
}
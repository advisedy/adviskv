syntax = "proto3";

package adviskv.sdm.rpc;

import "common.proto";


message GetRouteRequest{
    string db_name = 1;
    string table_name = 2;
    bytes key = 3;
    bool use_id = 4;
    int32 table_id = 5;
    int32 shard_id = 6;
}

message RouteReplica {
    adviskv.pb.Endpoint endpoint = 1;
    adviskv.pb.RaftRole role = 2;
    adviskv.pb.ReplicaID replica_id = 3;
}

message GetRouteResponse{
    adviskv.pb.BaseRsp base_rsp = 1;
    int32 table_id = 2;
    int32 shard_id = 3;
    repeated RouteReplica replicas = 4;
}

message GetTableMetaRequest{
    string db_name = 1;
    string table_name = 2;
}

message GetTableMetaResponse{
    adviskv.pb.BaseRsp base_rsp = 1;
    int32 table_id = 2;
    int32 shard_count = 3;
}

message ShardRoute {
    int32 shard_id = 1;
    repeated RouteReplica replicas = 2;
}

message GetTableRoutesRequest{
    string db_name = 1;
    string table_name = 2;
}

message GetTableRoutesResponse{
    adviskv.pb.BaseRsp base_rsp = 1;
    int32 table_id = 2;
    int32 shard_count = 3;
    repeated ShardRoute routes = 4;
}

message GetShardRouteRequest{
    int32 table_id = 1;
    int32 shard_id = 2;
}

message GetShardRouteResponse{
    adviskv.pb.BaseRsp base_rsp = 1;
    int32 table_id = 2;
    int32 shard_id = 3;
    repeated RouteReplica replicas = 4;
}

message RegisterNodeRequest{
    string node_id = 1;
    string ip = 2;
    int32 port = 3;
    string resource_pool = 4;
    string dc = 5;
}

message RegisterNodeResponse{
    adviskv.pb.BaseRsp base_rsp = 1;
}

message PlaceTableRequest{
    int32 db_id = 1;
    int32 table_id = 2;
    string db_name = 3;
    string table_name = 4;
    int32 shard_count = 5;
    int32 replica_count = 6;
    string resource_pool = 7;
    string operation_id = 8;
    adviskv.pb.EngineType engine_type = 9;
}

message PlaceTableResponse{
    adviskv.pb.BaseRsp base_rsp = 1;
}

message DropTableRequest{
    int32 table_id = 1;
    string operation_id = 2;
}

message DropTableResponse{
    adviskv.pb.BaseRsp base_rsp = 1;
}

message AlterTableReplicaCountRequest{
    int32 table_id = 1;
    int32 replica_count = 2;
    string operation_id = 3;
}

message AlterTableReplicaCountResponse{
    adviskv.pb.BaseRsp base_rsp = 1;
}

message GetTableStatusRequest{
    string operation_id = 1;
    int32 table_id = 2;
}

message GetTableStatusResponse{
    adviskv.pb.BaseRsp base_rsp = 1;
    int32 table_id = 2;
    adviskv.pb.SdmTableDesired desired = 3;
    adviskv.pb.SdmTablePhase phase = 4;
    string last_error_msg = 5;
    string operation_id = 6;
}

message HeartbeatReplicaInfo{
    adviskv.pb.ReplicaID replica_id = 1;
    adviskv.pb.RaftRole role = 2;
    adviskv.pb.StorageReplicaStatus status = 3;
    int64 term = 4;
    adviskv.pb.RaftMemberType member_type = 5;
    repeated adviskv.pb.RaftMember full_membership = 6;
}

message HeartbeatRequest{
    string node_id = 1;
    string ip = 2;
    int32 port = 3;
    string resource_pool = 4;
    string dc = 5;
    repeated HeartbeatReplicaInfo replica_info_list = 6;
}

enum ExpectedReplicaType {
    PRESENT = 0;
    ABSENT = 1;
    ADD_MEMBER = 2;
    REMOVE_MEMBER = 3;
}

message ExpectedReplica {
    ExpectedReplicaType type = 1;
    adviskv.pb.ReplicaID replica_id = 2;
    adviskv.pb.EngineType engine_type = 3;
    repeated adviskv.pb.PeerMember initial_members = 4;
}

message HeartbeatResponse{
    adviskv.pb.BaseRsp base_rsp = 1;
    repeated ExpectedReplica expects = 2;
}

service SdmService{
    rpc GetRoute(GetRouteRequest) returns (GetRouteResponse);
    rpc GetTableMeta(GetTableMetaRequest) returns (GetTableMetaResponse);
    rpc GetTableRoutes(GetTableRoutesRequest) returns (GetTableRoutesResponse);
    rpc GetShardRoute(GetShardRouteRequest) returns (GetShardRouteResponse);
    rpc RegisterNode(RegisterNodeRequest) returns (RegisterNodeResponse);
    rpc PlaceTable(PlaceTableRequest) returns (PlaceTableResponse);
    rpc DropTable(DropTableRequest) returns (DropTableResponse);
    rpc AlterTableReplicaCount(AlterTableReplicaCountRequest) returns (AlterTableReplicaCountResponse);
    rpc GetTableStatus(GetTableStatusRequest) returns (GetTableStatusResponse);
    rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
}

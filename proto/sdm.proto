syntax = "proto3";

package adviskv.rpc;

import "common.proto";




message GetRouteRequest{
    string db_name = 1;
    string table_name = 2;
    bytes key = 3;
}

message RouteReplica {
    adviskv.pb.Endpoint endpoint = 1;
    adviskv.pb.ReplicaRole role = 2;
}

message GetRouteResponse{
    adviskv.pb.BaseRsp base_rsp = 1;
    int32 table_id = 2;
    int32 shard_id = 3;
    repeated RouteReplica replicas = 4;
}

message RegisterNodeRequest{
    string node_id = 1;
    string ip = 2;
    int32 port = 3;
    string resource_pool = 4;
    string dc = 5;
}

message RegisterNodeResponse{
    adviskv.pb.BaseRsp base_rsp = 1;
}

message PlaceTableRequest{
    int32 db_id = 1;
    int32 table_id = 2;
    string db_name = 3;
    string table_name = 4;
    int32 shard_count = 5;
    int32 replica_count = 6;
    string resource_pool = 7;
    string operation_id = 8;
}

message PlaceTableResponse{
    adviskv.pb.BaseRsp base_rsp = 1;
}

message DropTableRequest{
    int32 table_id = 1;
    string operation_id = 2;
}

message DropTableResponse{
    adviskv.pb.BaseRsp base_rsp = 1;
}

message GetTableStatusRequest{
    string operation_id = 1;
    int32 table_id = 2;
}

message GetTableStatusResponse{
    adviskv.pb.BaseRsp base_rsp = 1;
    int32 table_id = 2;
    int32 desired = 3;
    int32 phase = 4;
    string last_error_msg = 5;
    string operation_id = 6;
}

message PlaceDBRequest{
    int32 db_id = 1;
    string db_name = 2;
    string zone = 3;
}

message PlaceDBResponse{
    adviskv.pb.BaseRsp base_rsp = 1;
}

message HeartBeatReplicaInfo{
    int32 table_id = 1;
    int32 shard_id = 2;
    int32 replica_index = 3;
    adviskv.pb.ReplicaRole role = 4;
    adviskv.pb.ReplicaStatus status = 5;
    int64 term = 6;
}

message HeartBeatRequest{
    string node_id = 1;
    string ip = 2;
    int32 port = 3;
    string resource_pool = 4;
    string dc = 5;
    repeated HeartBeatReplicaInfo replica_info_list = 6;
}

message HeartBeatReplicaExpect{
    int32 table_id = 1;
    int32 shard_id = 2;
    int32 replica_index = 3;
    adviskv.pb.ReplicaRole role = 4;
    int32 engine_type = 5;
    repeated adviskv.pb.PeerMember members = 6;
}

message HeartBeatResponse{
    adviskv.pb.BaseRsp base_rsp = 1;
    repeated HeartBeatReplicaExpect replica_list = 2;
}

service ShardingManagerService{
    rpc GetRoute(GetRouteRequest) returns (GetRouteResponse);
    rpc RegisterNode(RegisterNodeRequest) returns (RegisterNodeResponse);
    rpc PlaceTable(PlaceTableRequest) returns (PlaceTableResponse);
    rpc DropTable(DropTableRequest) returns (DropTableResponse);
    rpc GetTableStatus(GetTableStatusRequest) returns (GetTableStatusResponse);
    rpc PlaceDB(PlaceDBRequest) returns (PlaceDBResponse);
    rpc HeartBeat(HeartBeatRequest) returns (HeartBeatResponse);
}

# storage
node_id: "storage-6"
ip: "127.0.0.1"
port: 50056
listen_host: "127.0.0.1"
resource_pool: "default"
dc: "dc1"
data_dir: "build/runtime/data/storage-6"
heartbeat_interval_ms: 3000
raft_rpc_timeout_ms: 1000

#log
logger_name: "storage-6_log"
log_dir: "build/runtime/logs/storage-6"
log_filename: "storage-6.log"
log_level: "debug"
log_to_console: false
log_to_file: true

#sdm
manager_host: "127.0.0.1"
manager_port: 50049

# metrics
metrics_http_enable: true
metrics_http_host: "127.0.0.1"
metrics_http_port: 51056
metrics_http_path: "/metrics"

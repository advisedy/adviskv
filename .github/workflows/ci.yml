name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config

      - name: Cache vcpkg artifacts
        uses: actions/cache@v4
        with:
          path: |
            build/vcpkg_installed
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}-${{ hashFiles('scripts/build.sh') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Build and test
        run: ./scripts/run_test.sh

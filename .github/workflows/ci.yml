name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        # 使用 GitHub 官方提供的一个 Action：actions/checkout，作用是把你的仓库代码拉到 CI 机器上
        uses: actions/checkout@v4
        with:
          submodules: recursive  # 带上 submodules

      # 安装 ninja 和 pkg-config。
      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config

      # 缓存 vcpkg 依赖目录，下次 CI 可以少下载、少编译一些依赖。
      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: .adviskv_deps/vcpkg
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Setup dependencies
        run: ./scripts/setup.sh

      - name: Build
        run: ./scripts/build.sh

      - name: Test
        run: ctest --test-dir build/release --output-on-failure

      - name: E2E
        run: ./scripts/e2e_pytest.sh -q
